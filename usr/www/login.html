<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
	<link rel="stylesheet" href="/login.css" />
	<title>Acceso - NodeWay</title>
</head>

<body>
	<div class="login-shell">
		<div class="login-card">
			<div class="login-brand">
				<h1>NodeWay</h1>
				<p>Panel de configuracion del modem EG800 Mini</p>
			</div>

			<form id="login_form" class="login-form" autocomplete="on">
				<div class="form-group">
					<label for="login_user">Usuario</label>
					<input type="text" id="login_user" name="user" autocomplete="username" required />
				</div>
				<div class="form-group">
					<label for="login_pass">Contrasena</label>
					<div class="password-field">
						<input type="password" id="login_pass" name="pass" autocomplete="current-password" required />
						<button type="button" class="password-toggle" id="password_toggle" aria-label="Mostrar contrasena">Mostrar</button>
					</div>
				</div>
				<p id="login_error" class="login-error" hidden></p>
				<button type="submit" class="btn" id="login_submit">Ingresar</button>
			</form>
		</div>
	</div>

	<script src="/login.js"></script>
</body>

</html>
